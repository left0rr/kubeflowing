version: "3.9"

# ---------------------------------------------------------------------------
# Lightweight Edge MLOps infrastructure for GPON Predictive Maintenance
# Optimised to run on a 16 GB RAM VM.
# ---------------------------------------------------------------------------

services:

  # --------------------------------------------------------------------------
  # PostgreSQL – MLflow backend store
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: mlops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Keep memory footprint small
    command: >
      postgres
        -c shared_buffers=128MB
        -c max_connections=50

  # --------------------------------------------------------------------------
  # MinIO – S3-compatible artifact store for MLflow
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: mlops-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Create the default MLflow bucket on first start
  minio-init:
    image: minio/mc:latest
    container_name: mlops-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/mlflow-artifacts
      "
    restart: "no"

  # --------------------------------------------------------------------------
  # MLflow tracking server
  # --------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: mlops-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
        --default-artifact-root s3://mlflow-artifacts/
        --host 0.0.0.0
        --port 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # FastAPI prediction service
  # --------------------------------------------------------------------------
  serving:
    build:
      context: .
      dockerfile: serving/Dockerfile
    container_name: mlops-serving
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    ports:
      - "8000:8000"
    volumes:
      - model_store:/app/models

  # --------------------------------------------------------------------------
  # Prometheus – metrics collection
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: mlops-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"

  # --------------------------------------------------------------------------
  # Grafana – dashboards
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.3
    container_name: mlops-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/overview.json
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
  model_store:
